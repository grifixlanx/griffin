<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wine Design</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0e0e0e;
      color: white;
    }

    .top-bar {
      height: 120px;
      background-color: #8c2f14;
    }

    .container {
      position: relative;
      padding: 40px;
      overflow: hidden;
    }

    .big-text {
      font-size: 80px;
      font-weight: bold;
      color: transparent;
      -webkit-text-stroke: 1px #444;
      line-height: 0.9;
    }

    .small-text {
      margin-top: 20px;
      max-width: 300px;
      color: #ccc;
      font-size: 14px;
    }

    .bottle {
      position: absolute;
      top: 50%;
      left: 40%;
      transform: translate(-50%, -50%) rotate(-10deg);
      width: 400px;
    }

    .card {
      position: absolute;
      right: 50px;
      bottom: 40px;
      background: #d9cfc8;
      padding: 15px;
      border-radius: 10px;
    }

    .card img {
      width: 200px;
      border-radius: 10px;
    }

  </style>
</head>
<body>

     <a href="about.html">Go to About Us</a>/
   <a href="contactus.html" style="color: blue;">contact us</a>/
     <a href="ourprojects.html">ourprojects</a>/
  <div class="top-bar"></div>

  <div class="container">
    <div class="big-text">GONNA<br>BE GASSY.</div>

    <p class="small-text">
      Flat doesn’t exist sparkling wines effervescent for life long ahead.
    </p>

    <!-- Replace with your bottle image -->
    <img src="bottle.png" alt="Wine Bottle" class="bottle">

    <div class="card">
      <img src="drink.jpg" alt="Drink">
    </div>
  </div>

</body>
</html>
